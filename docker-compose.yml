services:
  backend:
    build:
      context: ./backend
    image: fuelfinder-backend
    container_name: fuelfinder-backend
    env_file:
      - .env.compose
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${ORACLE_WALLET_HOST_PATH}:/opt/oracle/wallet:ro

  frontend:
    build:
      context: ./frontend
    image: fuelfinder-frontend
    container_name: fuelfinder-frontend
    environment:
      BACKEND_UPSTREAM: backend:8000
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend